<!DOCTYPE html>
<html lang="es">

<head>

    <!-- ================================================= -->
    <!-- METADATOS -->
    <!-- ================================================= -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Formulario de contacto de Quality Industrial Services. Solicita información sobre nuestros servicios industriales y soluciones empresariales.">

    <title>Contacto | Quality Industrial Services Olam S.A.S</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="../css/gstyle.css">

    <!-- ICONO -->
    <link rel="icon" href="../images/Logo/ic.png">

</head>

<body>

<!-- ================================================= -->
<!-- HEADER (COMPONENTE) -->
<!-- ================================================= -->

<div id="header"></div>

<!-- ================================================= -->
<!-- CONTENIDO PRINCIPAL -->
<!-- ================================================= -->

<main>

    <!-- ✅ OVERLAY DEL MENÚ HAMBURGUESA (AGREGADO) -->
    <div class="menu-overlay"></div>

    <div class="container">

        <h1>Contáctanos</h1>

        <!-- ================================================= -->
        <!-- FORMULARIO -->
        <!-- ================================================= -->

        <form class="formulario" action="enviar.php" method="POST" novalidate>

            <!-- ============================================= -->
            <!-- NOMBRE -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required
                    minlength="3" maxlength="60" pattern="[A-Za-zÁÉÍÓÚáéíóúÑñ\s]+"
                    title="El nombre solo debe contener letras" autocomplete="name">
            </div>

            <!-- ============================================= -->
            <!-- EMPRESA -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="empresa">Empresa</label>
                <input type="text" id="empresa" name="empresa" placeholder="Ej: Tech Solutions SAS"
                    required minlength="2" maxlength="80" autocomplete="organization">
            </div>
                        
            <!-- ============================================= -->
            <!-- UBICACION -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="ubicacion">Ubicación</label>
                <input type="text" id="ubicacion" name="ubicacion" placeholder="Ej: Bogotá, Colombia"
                    required minlength="2" maxlength="80">
            </div>

            <!-- ============================================= -->
            <!-- CORREO -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="Ej: juan@empresa.com"
                    required maxlength="100" autocomplete="email">
            </div>

            <!-- ============================================= -->
            <!-- TELÉFONO -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="telefono">Número de teléfono</label>
                <input type="tel" id="telefono" name="telefono" placeholder="Ej: +57 3001234567"
                    required pattern="^\+?[0-9\s]{7,15}$" title="Ingrese un número válido"
                    autocomplete="tel">
            </div>

            <!-- ============================================= -->
            <!-- SERVICIO -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="servicio">Servicio de interés</label>
                <select id="servicio" name="servicio" required>
                    <option value="">Seleccione un servicio</option>
                    <option value="ingenieria">Ingeniería</option>
                    <option value="linea_petrolera">Línea petrolera</option>
                    <option value="remanufactura">Remanufactura de plantas</option>
                    <option value="tratamiento_agua">Tratamiento de agua</option>
                    <option value="ensayos_no_destructivos">Ensayos no destructivos</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <!-- ============================================= -->
            <!-- MENSAJE -->
            <!-- ============================================= -->

            <div class="form-group">
                <label for="mensaje">Necesidades del proyecto</label>
                <textarea id="mensaje" name="mensaje" rows="5"
                    placeholder="Cuéntanos como podemos ayudarte..." required minlength="10"
                    maxlength="500"></textarea>
            </div>

            <!-- BOTÓN -->
            <button type="submit">Enviar mensaje</button>

        </form>

    </div>

</main>

<!-- ================================================= -->
<!-- FOOTER (COMPONENTE) -->
<!-- ================================================= -->

<div id="footer"></div>

<!-- ================================================= -->
<!-- JAVASCRIPT -->
<!-- ================================================= -->

<script src="../js/components.js"></script>
<script src="../js/plantilla.js"></script>

</body>

</html>
